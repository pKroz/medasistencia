<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Control de Asistencia QR</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body{font-family:system-ui,Arial;margin:0;padding:16px;background:#f4f6f8}
    .box{max-width:520px;margin:0 auto;background:#fff;border-radius:12px;padding:16px;box-shadow:0 6px 20px rgba(0,0,0,.08)}
    h1{margin:0 0 8px}
    #reader{width:100%;max-width:360px;margin:12px auto;border:2px dashed #ddd;border-radius:12px;overflow:hidden}
    label{display:block;margin-top:12px;font-weight:600}
    input,select,button{width:100%;padding:12px;border-radius:10px;border:2px solid #e5e7eb;font-size:16px}
    button{background:#4CAF50;border:none;color:#fff;font-weight:700;cursor:pointer;margin-top:12px}
    button:disabled{background:#bbb;cursor:not-allowed}
    #respuesta{margin-top:12px;padding:12px;border-radius:10px;display:none;font-weight:700;text-align:center}
    .success{background:#d4edda;color:#155724}
    .warning{background:#fff3cd;color:#856404}
    .error{background:#f8d7da;color:#721c24}
    .info{margin-top:10px;padding:12px;border-radius:10px;background:#f8fafc;border:2px solid #e5e7eb;display:none}
    .row{display:flex;gap:10px}
    .row > div{flex:1}
    small{opacity:.7}
  </style>
</head>
<body>
  <div class="box">
    <h1>Aula PIP</h1>
    <small>Escanea tu QR o ingresa tu ID</small>

    <div id="reloj" style="margin-top:10px;font-weight:700"></div>

    <div id="reader"></div>

    <label for="id">ID del Estudiante</label>
    <input id="id" placeholder="Ingrese su ID" autocomplete="off"/>

    <div class="info" id="info">
      <div><b>Nombre:</b> <span id="iNombre">-</span></div>
      <div><b>Grado/Sección:</b> <span id="iArea">-</span></div>
      <div><b>Perfil:</b> <span id="iCargo">-</span></div>
    </div>

    <label for="estado">Estado</label>
    <select id="estado">
      <option value="INGRESO">INGRESO</option>
      <option value="SALIDA">SALIDA</option>
    </select>

    <button id="btn" disabled>Registrar Asistencia</button>

    <div id="respuesta"></div>

    <hr style="margin:18px 0; border:none; border-top:1px solid #eee"/>

    <h3 style="margin:0 0 10px">Panel Administrador</h3>
    <label for="admin-id">Generar carnet por ID</label>
    <input id="admin-id" placeholder="ID"/>
    <button id="btnCarnet">Generar carnet PDF</button>

    <label for="admin-grado" style="margin-top:14px">Generar lote por grado/sección</label>
    <select id="admin-grado"><option value="">Cargando...</option></select>
    <button id="btnLote">Generar lote PDF</button>
  </div>

<script>
/************* CONFIG *************/
const API_URL = "PEGA_AQUI_TU_URL_EXEC";     // <- EJ: https://script.google.com/macros/s/XXXX/exec
const API_KEY = "CAMBIA_ESTE_TOKEN_LARGO_Y_SEGURO"; // <- igual al de Apps Script

/************* JSONP HELPER (evita CORS) *************/
function api(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cb = "__cb_" + Math.random().toString(36).slice(2);
    window[cb] = (data) => {
      cleanup();
      resolve(data);
    };

    const qs = new URLSearchParams();
    qs.set("action", action);
    qs.set("key", API_KEY);
    qs.set("callback", cb);

    for (const [k, v] of Object.entries(params)) {
      qs.set(k, typeof v === "string" ? v : JSON.stringify(v));
    }

    const s = document.createElement("script");
    s.src = API_URL + "?" + qs.toString();
    s.onerror = () => { cleanup(); reject(new Error("Error de red / API")); };
    document.head.appendChild(s);

    function cleanup() {
      try { delete window[cb]; } catch(e) {}
      if (s && s.parentNode) s.parentNode.removeChild(s);
    }
  });
}

/************* UI *************/
let studentData = null;
let qr = null;
let isScanning = false;

function showMsg(msg, type){
  const el = document.getElementById("respuesta");
  el.className = type;
  el.textContent = msg;
  el.style.display = "block";
  if(type === "success") setTimeout(()=> el.style.display="none", 4000);
}

function showStudent(d){
  studentData = d;
  document.getElementById("info").style.display = "block";
  document.getElementById("iNombre").textContent = d.nombre || "-";
  document.getElementById("iArea").textContent = d.area || "-";
  document.getElementById("iCargo").textContent = d.cargo || "-";
  document.getElementById("btn").disabled = false;
}

function hideStudent(){
  studentData = null;
  document.getElementById("info").style.display = "none";
  document.getElementById("btn").disabled = true;
}

async function buscar(id){
  if(!id) { hideStudent(); return; }
  try{
    const r = await api("buscarEstudiante", { id });
    if(r && r.encontrado){
      showStudent(r.datos);
    } else {
      hideStudent();
      showMsg((r && r.mensaje) || "No encontrado", "warning");
    }
  } catch(e){
    hideStudent();
    showMsg("Error al buscar estudiante", "error");
  }
}

async function registrar(){
  const id = document.getElementById("id").value.trim();
  const estado = document.getElementById("estado").value;

  if(!id || !studentData){
    showMsg("Ingrese un ID válido", "error");
    return;
  }

  document.getElementById("btn").disabled = true;
  try{
    const payload = {
      id,
      nombre: studentData.nombre,
      area: studentData.area,
      cargo: studentData.cargo,
      telefono: studentData.telefono || "",
      estado
    };

    const r = await api("registrarAsistencia", { data: payload });

    if(r && r.exito){
      showMsg(`${estado} registrado para ${studentData.nombre} a las ${r.hora}`, "success");
      document.getElementById("id").value = "";
      document.getElementById("estado").value = "INGRESO";
      hideStudent();
    } else {
      showMsg((r && r.mensaje) || "No se pudo registrar", "warning");
      document.getElementById("btn").disabled = false;
    }
  } catch(e){
    showMsg("Error de conexión al registrar", "error");
    document.getElementById("btn").disabled = false;
  }
}

/************* QR *************/
async function startQR(){
  try{
    qr = new Html5Qrcode("reader");
    await qr.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      (text) => {
        const id = (text || "").trim();
        if(id){
          document.getElementById("id").value = id;
          buscar(id);
          showMsg("ID cargado desde QR", "success");
        }
      }
    );
    isScanning = true;
  } catch(err){
    console.error(err);
    showMsg("No se pudo acceder a la cámara (revisa permisos del navegador)", "error");
  }
}

/************* Admin: PDF *************/
function downloadBase64(base64, filename, mime){
  const a = document.createElement("a");
  a.href = `data:${mime};base64,${base64}`;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function cargarGrados(){
  try{
    const r = await api("listarGradosSecciones");
    const sel = document.getElementById("admin-grado");
    sel.innerHTML = '<option value="">Seleccione...</option>';
    (r.grados || []).forEach(g=>{
      const o = document.createElement("option");
      o.value = g;
      o.textContent = g;
      sel.appendChild(o);
    });
  } catch(e){
    document.getElementById("admin-grado").innerHTML = '<option value="">Error</option>';
  }
}

async function generarCarnet(){
  const id = document.getElementById("admin-id").value.trim();
  if(!id) return showMsg("Ingrese un ID para carnet", "warning");
  try{
    const r = await api("generarCarnetPdfPorId", { id });
    if(r && r.ok){
      downloadBase64(r.data, r.filename, "application/pdf");
      showMsg("Carnet generado", "success");
    } else {
      showMsg((r && r.mensaje) || "Error al generar", "error");
    }
  } catch(e){
    showMsg("Error de conexión (carnet)", "error");
  }
}

async function generarLote(){
  const grado = document.getElementById("admin-grado").value;
  if(!grado) return showMsg("Seleccione grado/sección", "warning");
  try{
    const r = await api("generarCarnetsPdfPorGrado", { grado });
    if(r && r.ok){
      downloadBase64(r.data, r.filename, "application/pdf");
      showMsg("Lote generado", "success");
    } else {
      showMsg((r && r.mensaje) || "Error al generar lote", "error");
    }
  } catch(e){
    showMsg("Error de conexión (lote)", "error");
  }
}

/************* Clock *************/
async function tick(){
  try{
    const r = await api("obtenerHoraPeru");
    const d = new Date(r.timestamp || Date.now());
    document.getElementById("reloj").textContent =
      d.toLocaleString("es-PE", { timeZone:"America/Lima" });
  } catch(e){
    document.getElementById("reloj").textContent = new Date().toLocaleString();
  }
}

/************* EVENTS *************/
let t = null;
document.getElementById("id").addEventListener("input", (e)=>{
  const v = e.target.value.trim();
  if(t) clearTimeout(t);
  if(v) t = setTimeout(()=> buscar(v), 700);
  else hideStudent();
});

document.getElementById("btn").addEventListener("click", registrar);
document.getElementById("btnCarnet").addEventListener("click", generarCarnet);
document.getElementById("btnLote").addEventListener("click", generarLote);

window.addEventListener("load", async ()=>{
  await tick();
  setInterval(tick, 15000);
  await cargarGrados();
  await startQR();
});
</script>
</body>
</html>
