<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de Asistencia QR</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root {
      --primary: #4CAF50;
      --primary-dark: #45a049;
      --secondary: #2196F3;
      --secondary-dark: #1976D2;
      --success: #d4edda;
      --success-text: #155724;
      --error: #f8d7da;
      --error-text: #721c24;
      --warning: #fff3cd;
      --warning-text: #856404;
      --bg-main: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --shadow: 0 4px 20px rgba(0,0,0,0.15);
      --border-radius: 12px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-main);
      min-height: 100vh;
      padding: 10px;
      line-height: 1.5;
    }

    .container {
      max-width: min(500px, 100vw - 20px);
      margin: 0 auto;
      background: white;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      background: var(--primary);
      color: white;
      padding: clamp(15px, 4vw, 25px);
      text-align: center;
    }

    .header h1 {
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 600;
      margin-bottom: 5px;
    }

    .header p {
      font-size: clamp(12px, 3vw, 14px);
      opacity: 0.9;
    }

    .content { padding: clamp(15px, 5vw, 30px); }

    .time-display {
      background: linear-gradient(45deg, #e8f5e8, #f0fff0);
      border: 2px solid var(--primary);
      border-radius: var(--border-radius);
      padding: 15px;
      text-align: center;
      margin-bottom: 20px;
      font-size: clamp(14px, 4vw, 18px);
      font-weight: 600;
      color: #2e7d32;
    }

    .camera-toggle {
      background: #f8f9fa;
      border: 2px solid #e9ecef;
      border-radius: var(--border-radius);
      padding: 15px;
      margin-bottom: 15px;
      text-align: center;
    }

    .toggle-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: var(--transition);
      border-radius: 28px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 22px; width: 22px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: var(--transition);
      border-radius: 50%;
    }

    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(22px); }

    .camera-controls { display: none; margin-bottom: 15px; }

    .camera-select select {
      width: 100%;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: var(--border-radius);
      font-size: 14px;
      background: white;
    }

    #reader {
      width: 100%;
      max-width: min(300px, 90vw);
      margin: 0 auto 20px;
      border: 2px dashed #ddd;
      border-radius: var(--border-radius);
      overflow: hidden;
      display: none;
    }

    .form-group { margin-bottom: 20px; }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: clamp(14px, 3.5vw, 16px);
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: clamp(10px, 3vw, 14px);
      border: 2px solid #ddd;
      border-radius: var(--border-radius);
      font-size: clamp(14px, 4vw, 16px);
      transition: var(--transition);
      background: white;
    }

    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
    }

    .btn {
      width: 100%;
      padding: clamp(12px, 3vw, 16px);
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--border-radius);
      font-size: clamp(14px, 4vw, 16px);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover:not(:disabled) {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary { background: var(--secondary); }
    .btn-secondary:hover:not(:disabled) { background: var(--secondary-dark); }

    .employee-info {
      background: linear-gradient(45deg, #f8f9fa, #ffffff);
      border: 2px solid var(--primary);
      border-radius: var(--border-radius);
      padding: 15px;
      margin-bottom: 20px;
      display: none;
      box-shadow: 0 2px 10px rgba(76, 175, 80, 0.1);
    }

    .employee-info h3 { color: var(--primary); margin-bottom: 10px; font-size: clamp(16px, 4vw, 18px); }
    .employee-info p { margin: 5px 0; color: #6c757d; font-size: clamp(13px, 3vw, 14px); }
    .employee-info .highlight { font-weight: 600; color: #495057; }

    #respuesta {
      margin-top: 20px;
      padding: 15px;
      border-radius: var(--border-radius);
      text-align: center;
      font-weight: 600;
      display: none;
      font-size: clamp(13px, 3.5vw, 15px);
    }

    .success { background: var(--success); color: var(--success-text); border: 1px solid #c3e6cb; }
    .error { background: var(--error); color: var(--error-text); border: 1px solid #f5c6cb; }
    .warning { background: var(--warning); color: var(--warning-text); border: 1px solid #ffeaa7; }

    .loading {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .qr-status {
      text-align: center;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: var(--border-radius);
      background: #e3f2fd;
      color: #1565c0;
      display: none;
      font-size: clamp(12px, 3vw, 14px);
    }

    .admin-panel {
      margin-top: 20px;
      border: 2px dashed #cbd5e1;
      border-radius: var(--border-radius);
      padding: 12px;
      background: #f8fafc;
    }

    .admin-panel h4 { font-size: clamp(14px, 4vw, 16px); margin-bottom: 10px; color: #1f2937; }
    .admin-status {
      display: none;
      margin-top: 10px;
      padding: 10px;
      border-radius: var(--border-radius);
      font-size: clamp(12px, 3vw, 14px);
      text-align: center;
    }

    @media (max-width: 480px) { body { padding: 5px; } .content { padding: 15px; } }
    @media (min-width: 768px) { .container { margin-top: 20px; } }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>Aula PIP</h1>
      <p>Escanea tu codigo QR o ingresa tu ID</p>
    </div>

    <div class="content">
      <div class="time-display" id="reloj-tiempo">Cargando...</div>

      <div class="camera-toggle">
        <div class="toggle-wrapper">
          <span>Camara:</span>
          <label class="switch">
            <input type="checkbox" id="camera-toggle" checked>
            <span class="slider"></span>
          </label>
          <span id="camera-status">Activada</span>
        </div>
      </div>

      <div class="qr-status" id="qr-status">Iniciando camara...</div>

      <div class="camera-controls" id="camera-controls">
        <div class="camera-select">
          <select id="camera-select">
            <option value="">Seleccione una camara...</option>
          </select>
        </div>
      </div>

      <div id="reader"></div>

      <button type="button" class="btn btn-secondary" id="reiniciar-btn" onclick="reiniciarQR()" style="display:none;">
        Reiniciar Escaner
      </button>

      <form id="formulario">
        <div class="form-group">
          <label for="id">ID del Estudiante:</label>
          <input type="text" id="id" required placeholder="Ingrese su ID">
        </div>

        <div class="employee-info" id="employee-info">
          <h3>Informacion del Estudiante</h3>
          <p><strong>Nombre:</strong> <span id="employee-name" class="highlight">-</span></p>
          <p><strong>Grado/Seccion:</strong> <span id="employee-area" class="highlight">-</span></p>
          <p><strong>Perfil:</strong> <span id="employee-position" class="highlight">-</span></p>
        </div>

        <div class="form-group">
          <label for="estado">Estado:</label>
          <select id="estado" required>
            <option value="INGRESO">INGRESO</option>
            <option value="SALIDA">SALIDA</option>
          </select>
        </div>

        <button type="submit" class="btn" id="btn-submit" disabled>
          Registrar Asistencia
        </button>
      </form>

      <div id="respuesta"></div>

      <div class="admin-panel">
        <button type="button" class="btn btn-secondary" id="admin-toggle">Panel Administrador</button>
        <div id="admin-body" style="display:none;">
          <h4>Generar Carnets</h4>

          <div class="form-group">
            <label for="admin-id">ID del Estudiante:</label>
            <input type="text" id="admin-id" placeholder="Ingrese ID">
          </div>
          <button type="button" class="btn" id="admin-generar-id">Generar carnet PDF</button>

          <div class="form-group">
            <label for="admin-grado">Grado/Seccion:</label>
            <select id="admin-grado">
              <option value="">Seleccione...</option>
            </select>
          </div>
          <button type="button" class="btn" id="admin-generar-lote">Generar lote PDF</button>

          <div id="admin-status" class="admin-status"></div>
        </div>
      </div>
    </div>
  </div>

<script>

/* ========= CONFIG ========= */

const GAS_URL = "https://script.google.com/macros/s/AKfycbwrbQ5PVueOlhqpgc_kKYt5wCTdapOWySVwNdlf2FhpskEm6BqLq64cTg8iy2aH_brG/exec";
const API_KEY = "MEDASSISTENCIA123";

/* ========= JSONP ========= */

function gasRequest(action, params = {}) {
  return new Promise((resolve, reject) => {

    const callback = "cb_" + Math.random().toString(36).substring(2);

    const query = new URLSearchParams({
      action: action,
      key: API_KEY,
      callback: callback,
      ...params
    });

    const script = document.createElement("script");
    script.src = GAS_URL + "?" + query.toString();

    window[callback] = function(data){
      delete window[callback];
      script.remove();
      resolve(data);
    };

    script.onerror = function(){
      delete window[callback];
      script.remove();
      reject("Error conexión GAS");
    };

    document.body.appendChild(script);

  });
}

/* ========= VARIABLES ========= */

let studentData = null;
let qrCodeReader = null;
let isScanning = false;
let ultimoQr = {text:null,ts:0};

/* ========= BUSCAR ESTUDIANTE ========= */

async function buscarEstudiante(id){

  if(!id) return;

  mostrarBusqueda();
  deshabilitarBotonRegistro();

  try{

    const r = await gasRequest("buscarEstudiante",{id:id});

    if(r && r.encontrado){

      studentData = r.datos;
      mostrarInfoEstudiante(r.datos);
      habilitarBotonRegistro();

    }else{

      ocultarInfoEstudiante();
      mostrarRespuesta("No encontrado","warning");

    }

  }catch(e){

    mostrarRespuesta("Error buscando estudiante","error");

  }

}

/* ========= REGISTRAR ========= */

async function registrarAsistencia(data){

  return gasRequest("registrarAsistencia",{
    data: JSON.stringify(data)
  });

}

/* ========= FORM SUBMIT ========= */

document.getElementById("formulario").addEventListener("submit", async function(e){

  e.preventDefault();

  const id = document.getElementById("id").value.trim();
  const estado = document.getElementById("estado").value;

  if(!id || !studentData){
    mostrarRespuesta("Ingrese un ID válido","error");
    return;
  }

  const btn = document.getElementById("btn-submit");
  const textoOriginal = btn.innerHTML;

  btn.innerHTML = '<div class="loading"></div> Registrando...';
  btn.disabled = true;

  const data = {
    id:id,
    nombre:studentData.nombre,
    area:studentData.area,
    cargo:studentData.cargo,
    telefono:studentData.telefono || '',
    estado:estado
  };

  const TIMEOUT = 12000;

  const timeoutPromise = new Promise((_,reject)=>
    setTimeout(()=>reject(new Error("TIMEOUT")),TIMEOUT)
  );

  try{

    const r = await Promise.race([
      registrarAsistencia(data),
      timeoutPromise
    ]);

    if(r && r.exito){

      mostrarRespuesta(`${estado} registrado a las ${r.hora}`,"success");

      document.getElementById("formulario").reset();
      document.getElementById("estado").value="INGRESO";

      ocultarInfoEstudiante();
      deshabilitarBotonRegistro();

    }else{

      mostrarRespuesta("No se pudo registrar","warning");
      habilitarBotonRegistro();

    }

  }catch(e){

    if(e.message==="TIMEOUT"){
      mostrarRespuesta("Se registró pero el servidor tardó en responder","warning");
    }else{
      mostrarRespuesta("Error de conexión","error");
    }

    habilitarBotonRegistro();

  }finally{

    btn.innerHTML = textoOriginal;

  }

});

/* ========= QR ========= */

function procesarQR(texto){

  const ahora = Date.now();

  if(ultimoQr.text===texto && ahora-ultimoQr.ts<2500){
    return;
  }

  ultimoQr = {text:texto,ts:ahora};

  document.getElementById("id").value = texto;
  buscarEstudiante(texto);

}

/* ========= INICIAR QR ========= */

function iniciarQR(){

  qrCodeReader = new Html5Qrcode("reader");

  qrCodeReader.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },

    decodedText => {
      procesarQR(decodedText);
    },

    error => {}
  ).then(()=>{
    isScanning=true;
  }).catch(err=>{
    console.error(err);
  });

}

/* ========= REINICIAR QR ========= */

async function reiniciarQR(){

  if(qrCodeReader && isScanning){
    try{
      await qrCodeReader.stop();
    }catch(e){}
  }

  iniciarQR();

}

/* ========= UI ========= */

function mostrarBusqueda(){

  const info=document.getElementById("employee-info");
  info.style.display="block";

  document.getElementById("employee-name").innerHTML="Buscando...";
  document.getElementById("employee-area").textContent="-";
  document.getElementById("employee-position").textContent="-";

}

function mostrarInfoEstudiante(d){

  document.getElementById("employee-info").style.display="block";

  document.getElementById("employee-name").textContent=d.nombre;
  document.getElementById("employee-area").textContent=d.area;
  document.getElementById("employee-position").textContent=d.cargo;

}

function ocultarInfoEstudiante(){
  document.getElementById("employee-info").style.display="none";
  studentData=null;
}

function habilitarBotonRegistro(){
  document.getElementById("btn-submit").disabled=false;
}

function deshabilitarBotonRegistro(){
  document.getElementById("btn-submit").disabled=true;
}

function mostrarRespuesta(mensaje,tipo){

  const r=document.getElementById("respuesta");

  r.textContent=mensaje;
  r.className=tipo;
  r.style.display="block";

  if(tipo==="success"){
    setTimeout(()=>r.style.display="none",4000);
  }

}

/* ========= ID INPUT ========= */

document.getElementById("id").addEventListener("input",function(){

  const id=this.value.trim();

  ocultarInfoEstudiante();
  deshabilitarBotonRegistro();

  if(id.length>0){
    setTimeout(()=>buscarEstudiante(id),1000);
  }

});

/* ========= START ========= */

window.addEventListener("load",function(){

  iniciarQR();

});

</script>
</body>
</html>
